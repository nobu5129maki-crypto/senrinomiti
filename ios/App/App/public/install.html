<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0c7a73">
  <title>インストール — 千里の道も一歩から</title>
  <link rel="icon" href="./icons/icon-192.png" type="image/png">
  <style>
    body { font-family: system-ui, sans-serif; background: #eef7f4; color: #1a3d38; margin: 0; padding: 24px 16px; }
    .box { max-width: 420px; margin: 0 auto; text-align: center; }
    h1 { font-size: 1.2rem; color: #065954; }
    p { line-height: 1.7; color: #5f7a75; }
    .links { display: grid; gap: 12px; margin-top: 24px; }
    a { display: block; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 700; }
    .android { background: #0c7a73; color: #fff; }
    .ios { background: #fff; color: #0c7a73; border: 2px solid #0c7a73; }
  </style>
</head>
<body>
  <div class="box">
    <h1>インストールページへ移動中…</h1>
    <p id="hint">お使いの端末を判定しています。</p>
    <div class="links" id="links" hidden>
      <a class="android" id="android-link" href="./install-android.html">Android版のインストール</a>
      <a class="ios" id="ios-link" href="./install-ios.html">iPhone版のインストール</a>
    </div>
  </div>
  <script type="module">
    const ua = navigator.userAgent || '';
    const isAndroid = /Android/i.test(ua);
    const isIOS = /iPad|iPhone|iPod/i.test(ua) && !window.MSStream;

    if (isAndroid) {
      location.replace('./install-android.html');
    } else if (isIOS) {
      location.replace('./install-ios.html');
    } else {
      document.getElementById('hint').textContent = 'スマホで次のリンクを開いてください。';
      document.getElementById('links').hidden = false;
    }
  </script>
</body>
</html>
